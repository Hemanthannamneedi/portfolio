        :root { --bg-dark: #020617; --card-bg: rgba(15, 23, 42, 0.7); --accent: #38bdf8; --glass-border: rgba(255, 255, 255, 0.08); }
        .light-mode { --bg-dark: #f8fafc; --card-bg: rgba(255, 255, 255, 0.8); --accent: #2563eb; --glass-border: rgba(0, 0, 0, 0.1); }

        .light-mode .form-input { background-color: rgba(255, 255, 255, 0.7); border-color: #cbd5e1; color: #0f172a; }

        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 30px) scale(1.1); } }
        .glass-card { background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 1rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .animate-fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; } .delay-2 { animation-delay: 0.2s; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .text-gradient { background: linear-gradient(to right, #38bdf8, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }

        .desktop-nav-link:hover { background: rgba(56, 189, 248, 0.1); color: var(--accent); padding-left: 1.5rem; }
        .desktop-nav-active { border-left: 4px solid var(--accent); background: linear-gradient(90deg, rgba(56,189,248,0.15) 0%, transparent 100%); color: var(--accent); }

    <script>
        const setupTheme = () => {
            const body = document.body;
            const isLight = localStorage.getItem('theme') === 'light';
            if(isLight) body.classList.add('light-mode');
            const sun = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>';
            const moon = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
            document.querySelectorAll('#theme-icon, #mobile-theme-icon').forEach(i => i.innerHTML = isLight ? sun : moon);
        };
        const toggleTheme = () => { document.body.classList.toggle('light-mode'); localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark'); setupTheme(); };
        document.getElementById('theme-toggle')?.addEventListener('click', toggleTheme);
        document.getElementById('mobile-theme-toggle')?.addEventListener('click', toggleTheme);
        setupTheme();

        const form = document.querySelector('form');
        const toast = document.getElementById('toast');
        const submitBtn = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', async function(e) {
            e.preventDefault(); 
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = 'Sending...';
            submitBtn.disabled = true;
            try {
                const response = await fetch(form.action, { method: 'POST', body: new FormData(form), headers: { 'Accept': 'application/json' } });
                if (response.ok) {
                    form.reset(); 
                    toast.classList.remove('translate-y-20', 'opacity-0');
                    setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0'); }, 4000);
                }
            } finally {
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
            }
        });
    </script>
